     - homepage.description=Prowlarr is an indexer manager/proxy for Usenet and BitTorrent users. It can monitor multiple RSS feeds for new content and will automatically add them to your collection, even when they are released. It also has support for automatically downloading, sorting, and renaming files.
     - traefik.enable=true
