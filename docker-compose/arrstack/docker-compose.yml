      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
     - homepage.group=ArrStack
     - homepage.name=Sonarr
     - homepage.icon=sonarr.png
     - homepage.href=https://sonarr.rjester.us/
     - homepage.description=Sonarr is a TV series collection manager for Usenet and BitTorrent users. It can monitor multiple RSS feeds for new episodes and will automatically add them to your collection, even when they are released. It also has support for automatically downloading, sorting, and renaming files.
     - traefik.enable=true
