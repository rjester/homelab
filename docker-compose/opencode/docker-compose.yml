services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped

    networks:
      - proxy

    volumes:
      - ./ollama:/root/.ollama

    # Optional direct access
    ports:
      - "11434:11434"
    environment:
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_KEEP_ALIVE: 5m

    labels:
      - traefik.enable=true

      # Router
      - traefik.http.routers.ollama.rule=Host(`ollama.rjester.us`)
      - traefik.http.routers.ollama.entrypoints=https

      # Service
      - traefik.http.services.ollama.loadbalancer.server.port=11434

      # Optional middleware
      #- traefik.http.routers.ollama.middlewares=local-ipallowlist@file

  opencode:
    image: ghcr.io/anomalyco/opencode:latest
    container_name: opencode
    restart: unless-stopped

    depends_on:
      - ollama

    networks:
      - proxy

    environment:
      - OPENAI_BASE_URL=http://ollama:11434/v1
      - OPENAI_API_KEY=dummy
      - OPENAI_MODEL=devstral
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENCODE_HOST=0.0.0.0
      - OPENCODE_PORT=4096

    stdin_open: true
    tty: true

    volumes:
      - ./opencode/config.yml:/app/config.yaml

    labels:
      - traefik.enable=true

      # Router
      - traefik.http.routers.opencode.rule=Host(`opencode.rjester.us`)
      - traefik.http.routers.opencode.entrypoints=https

      # Internal container port
      - traefik.http.services.opencode.loadbalancer.server.port=3000

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped

    depends_on:
      - ollama

    networks:
      - proxy

    environment:
      - OLLAMA_BASE_URL=http://ollama:11434

      # Optional
      - WEBUI_AUTH=True
      - ENABLE_SIGNUP=True
      - WEBUI_SECRET_KEY=64741ec858e595a6db7dbb6ef4fdca6b42cd0d55687b313ad7249d74dcf23186

    volumes:
      - ./open-webui:/app/backend/data

    # Optional direct access
    ports:
      - "3001:8080"

    labels:
      - traefik.enable=true

      # Router
      - traefik.http.routers.openwebui.rule=Host(`ai.rjester.us`)
      - traefik.http.routers.openwebui.entrypoints=https

      # Service
      - traefik.http.services.openwebui.loadbalancer.server.port=8080

      # Optional middleware
      #- traefik.http.routers.openwebui.middlewares=local-ipallowlist@file

  litellm:
    image: ghcr.io/berriai/litellm:stable-v1.40.14
    container_name: litellm
    restart: unless-stopped

    entrypoint: ["litellm"]

    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"

    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro

    ports:
      - "4000:4000"

    depends_on:
      - ollama

    networks:
      - proxy

    labels:
      - traefik.enable=true
      - traefik.http.routers.litellm.rule=Host(`llm.rjester.us`)
      - traefik.http.routers.litellm.entrypoints=https
      - traefik.http.services.litellm.loadbalancer.server.port=4000

networks:
  proxy:
    external: true