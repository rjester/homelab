############################
# SEERR
############################

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr1
    environment:
      - LOG_LEVEL=debug
      - TZ=America/New_York
      - PORT=5055
    ports:
      - 5055:5055
    networks:
      - proxy
    volumes:
      - /arr/data/configs/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    labels:
     - homepage.group=ArrStack
     - homepage.name=Seerr
     - homepage.icon=seerr.png
     - homepage.href=https://seerr.rjester.us/
     - homepage.description=Seerr is a media discovery and request management tool.
     - traefik.enable=true
     - traefik.http.routers.seerr.rule=Host(`seerr.rjester.us`)
     - traefik.http.routers.seerr.entrypoints=https
     - traefik.http.routers.seerr.tls=true
     - traefik.http.services.seerr.loadbalancer.server.port=5055
     - traefik.docker.network=proxy

networks:
  proxy:
    external: true