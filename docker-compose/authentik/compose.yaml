---
services:
  authentik:
    image: ghcr.io/goauthentik/server:2026.2.2
    restart: unless-stopped
    command: server
    environment:
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_ERROR_REPORTING__ENABLED=none
      - AUTHENTIK_POSTGRESQL__HOST=authentik_postgres
      - AUTHENTIK_POSTGRESQL__PORT=5432
      - AUTHENTIK_POSTGRESQL__USER=${DATABASE_USER}
      - AUTHENTIK_POSTGRESQL__NAME=authentik
      - AUTHENTIK_POSTGRESQL__PASSWORD=${DATABASE_PASSWORD}
    networks:
      - proxy
      - authentik_backend
    volumes:
      - /docker/authentik/data:/data
      - /docker/authentik/templates:/templates
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.services.authentik_web.loadBalancer.server.port=9000
      - traefik.http.routers.authentik_http.service=authentik_web
      - traefik.http.routers.authentik_http.rule=Host(`authentik.rjester.us`)
      - traefik.http.routers.authentik_http.entrypoints=http
      - "traefik.http.middlewares.authentik.forwardauth.address=\
        http://authentik:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authentik.forwardauth.authResponseHeaders=\
        X-authentik-username,\
        X-authentik-groups,\
        X-authentik-entitlements,\
        X-authentik-email,\
        X-authentik-name,\
        X-authentik-uid,\
        X-authentik-jwt,\
        X-authentik-meta-jwks,\
        X-authentik-meta-outpost,\
        X-authentik-meta-provider,\
        X-authentik-meta-app,\
        X-authentik-meta-version"
      - traefik.http.routers.authentik_https.service=authentik_web
      - traefik.http.routers.authentik_https.rule=Host(`authentik.rjester.us`)
      - traefik.http.routers.authentik_https.entrypoints=https
      - traefik.http.routers.authentik_https.tls=true
      - traefik.http.routers.authentik_https.tls.certresolver=cloudflare
    depends_on:
      - authentik_postgres

  authentik_worker:
    image: ghcr.io/goauthentik/server:2026.2.2
    restart: unless-stopped
    command: worker
    environment:
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_ERROR_REPORTING__ENABLED=none
      - AUTHENTIK_POSTGRESQL__HOST=authentik_postgres
      - AUTHENTIK_POSTGRESQL__PORT=5432
      - AUTHENTIK_POSTGRESQL__USER=${DATABASE_USER}
      - AUTHENTIK_POSTGRESQL__NAME=authentik
      - AUTHENTIK_POSTGRESQL__PASSWORD=${DATABASE_PASSWORD}
      - AUTHENTIK_BOOTSTRAP_PASSWORD=${AUTHENTIK_BOOTSTRAP_PASSWORD}
    user: root
    networks:
      - authentik_backend
    volumes:
      - /run/docker.sock:/run/docker.sock
      - /docker/authentik/data:/data
      - /docker/authentik/certs:/certs
      - /docker/authentik/templates:/templates
    depends_on:
      - authentik_postgres
  authentik_postgres:
    image: docker.io/library/postgres:17.9
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=authentik
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      start_period: 30s
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - authentik_backend
    volumes:
      - /docker/authentik/postgres:/var/lib/postgresql/data

networks:
  authentik_backend:
    driver: bridge
  proxy:
    external: true
