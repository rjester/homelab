services:

############################
# GLUETUN
############################

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun1
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ports:
      - 9696:9696 #prowlarr
      - 7878:7878 #radarr
      - 8989:8989 #sonarr
      - 6767:6767 #bazarr
      #- 8686:8686 #lidarr
      - 8080:8080 #qbittorrent
      - 6881:6881 #qbittorrent
      - 6881:6881/udp #qbittorrent
      - 8191:8191 #flaresolverr
    networks:
      - proxy
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=qNQQLYMpU67R9pZfxWMbIARrDZn+PUOku0/qaam/I0Q=
      - SERVER_COUNTRIES=Netherlands
    restart: unless-stopped

############################
# RADARR
############################

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr1
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /arr/data/configs/radarr:/config
      - /arr/data/media:/media
      - /arr/data/media/downloads:/downloads
    restart: unless-stopped    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7878/ping"]
      interval: 45s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
     - homepage.group=ArrStack
     - homepage.name=Radarr
     - homepage.icon=radarr.png
     - homepage.href=https://radarr.rjester.us/
     - homepage.description=Radarr is a movie collection manager for Usenet and BitTorrent users. It can monitor multiple RSS feeds for new movies and will automatically add them to your collection, even when they are released. It also has support for automatically downloading, sorting, and renaming files.
     - traefik.enable=true
     - traefik.http.routers.radarr.rule=Host(`radarr.rjester.us`)
     - traefik.http.routers.radarr.entrypoints=https
     - traefik.http.routers.radarr.tls=true
     - traefik.http.services.radarr.loadbalancer.server.port=7878
     - traefik.docker.network=proxy

############################
# SONARR
############################

  sonarr:
