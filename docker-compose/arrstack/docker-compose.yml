############################
# QBITTORRENT		
############################

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent1
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /arr/data/configs/qbittorrent:/config
      - /arr/data/media:/media
    restart: unless-stopped    
    healthcheck:
      test: ["CMD-SHELL", "curl -s 'http://localhost:8080/api/v2/transfer/info' | jq -e '.dht_nodes > 0'"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 2m
      # test: ["CMD-SHELL", "curl -f -s http://127.0.0.1:8080/ > /dev/null || exit 1"]
      # interval: 45s
      # timeout: 10s
      # retries: 3
      # start_period: 90s
    labels:
     - homepage.group=ArrStack
     - homepage.name=Qbittorrent
     - homepage.icon=qbittorrent.png
     - homepage.href=https://qbit.rjester.us/
     - homepage.description=Qbittorrent is a torrent client for Usenet and BitTorrent users. It can monitor multiple RSS feeds for new content and will automatically add them to your collection, even when they are released. It also has support for automatically downloading, sorting, and renaming files.
     - traefik.enable=true
     - traefik.http.routers.qbittorrent.rule=Host(`qbit.rjester.us`)
     - traefik.http.routers.qbittorrent.entrypoints=https
     - traefik.http.routers.qbittorrent.tls=true
     - traefik.http.services.qbittorrent.loadbalancer.server.port=8080
     - traefik.docker.network=proxy

############################
# FLARESOLVERR
############################

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr1
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=America/New_York
    restart:  unless-stopped 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8191/"]
      interval: 45s
      timeout: 10s
      retries: 3
      start_period: 30s   

